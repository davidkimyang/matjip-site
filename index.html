<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>우리동네 맛집</title>
  <style>
    :root{
      --bg:#0b1020;
      --card:#111a33;
      --muted:#9aa7c7;
      --text:#e8eeff;
      --line:#233058;
      --accent:#6ee7ff;
      --accent2:#a78bfa;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", Segoe UI, Roboto, sans-serif;
      background: radial-gradient(1200px 700px at 20% 10%, rgba(110,231,255,.18), transparent 60%),
                  radial-gradient(900px 500px at 80% 0%, rgba(167,139,250,.18), transparent 55%),
                  var(--bg);
      color:var(--text);
    }
    header{
      position:sticky; top:0;
      backdrop-filter: blur(10px);
      background: rgba(11,16,32,.65);
      border-bottom:1px solid rgba(35,48,88,.6);
      z-index:10;
    }
    .wrap{max-width:1080px; margin:0 auto; padding:16px}
    .top{
      display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap;
    }
    .brand{
      display:flex; flex-direction:column; gap:2px;
    }
    .brand h1{margin:0; font-size:20px; letter-spacing:-.2px}
    .brand p{margin:0; color:var(--muted); font-size:12px}
    .controls{
      display:flex; gap:10px; align-items:center; flex-wrap:wrap;
    }
    input, select, button{
      border:1px solid rgba(35,48,88,.8);
      background: rgba(17,26,51,.75);
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      outline:none;
    }
    input{min-width:220px}
    select{min-width:140px}
    button{
      cursor:pointer;
      transition:.15s;
    }
    button:hover{transform: translateY(-1px); border-color: rgba(110,231,255,.7)}
    main{padding:18px 0 50px}
    .meta{
      display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap;
      color:var(--muted);
      font-size:13px;
      margin:12px 0 0;
    }
    .grid{
      margin-top:16px;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:14px;
    }
    @media (max-width: 900px){ .grid{grid-template-columns: repeat(2, 1fr);} }
    @media (max-width: 560px){ .grid{grid-template-columns: 1fr;} input{min-width:100%} }
    .card{
      border:1px solid rgba(35,48,88,.75);
      background: linear-gradient(180deg, rgba(17,26,51,.85), rgba(17,26,51,.65));
      border-radius:18px;
      padding:14px;
      box-shadow: 0 12px 30px rgba(0,0,0,.22);
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .badge{
      display:inline-flex;
      gap:8px;
      align-items:center;
      font-size:12px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(35,48,88,.9);
      color:var(--muted);
      width:fit-content;
    }
    .title{
      margin:2px 0 0;
      font-size:16px;
      line-height:1.3;
    }
    .desc{
      margin:0;
      color:var(--muted);
      font-size:13px;
      line-height:1.4;
      min-height: 36px;
    }
    .row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      color:var(--muted);
      font-size:12px;
    }
    .stars{
      color: #ffd86b;
      letter-spacing: 1px;
      font-size:12px;
      white-space:nowrap;
    }
    .actions{
      display:flex;
      gap:10px;
      margin-top:auto;
    }
    .primary{
      background: linear-gradient(90deg, rgba(110,231,255,.18), rgba(167,139,250,.18));
      border-color: rgba(110,231,255,.55);
    }
    .ghost{
      background: transparent;
    }

    /* modal */
    .modalBack{
      position:fixed; inset:0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:center; justify-content:center;
      padding:18px;
      z-index:50;
    }
    .modal{
      width:min(720px, 100%);
      border-radius:18px;
      border:1px solid rgba(35,48,88,.9);
      background: #0d1430;
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
      overflow:hidden;
    }
    .modalHead{
      padding:14px 16px;
      border-bottom:1px solid rgba(35,48,88,.8);
      display:flex; justify-content:space-between; align-items:center; gap:10px;
    }
    .modalHead h2{margin:0; font-size:16px}
    .close{
      border-radius:12px;
      padding:8px 10px;
      background: rgba(17,26,51,.75);
    }
    .modalBody{padding:16px; display:grid; gap:12px}
    .kv{
      display:grid; grid-template-columns: 110px 1fr;
      gap:10px;
      font-size:14px;
    }
    .k{color:var(--muted)}
    .v{color:var(--text)}
    .tips{
      border:1px dashed rgba(110,231,255,.4);
      background: rgba(110,231,255,.08);
      border-radius:14px;
      padding:12px;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="top">
        <div class="brand">
          <h1>우리동네 맛집</h1>
          <p>검색/필터로 맛집을 빠르게 찾아보자 (초보자 버전 MVP)</p>
        </div>

        <div class="controls">
          <input id="q" placeholder="검색: 가게명 / 메뉴 / 지역" />
          <select id="cat">
            <option value="">카테고리(전체)</option>
          </select>
          <select id="area">
            <option value="">지역(전체)</option>
          </select>
          <button id="reset" class="ghost">초기화</button>
          <button id="addDemo" class="primary">데모 추가</button>
        </div>
      </div>
      <div class="meta">
        <div>결과: <span id="count">0</span>개</div>
        <div>팁: 카드 클릭 → 상세 보기</div>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div id="grid" class="grid"></div>
  </main>

  <!-- modal -->
  <div id="modalBack" class="modalBack" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modalHead">
        <h2 id="mTitle">상세</h2>
        <button class="close" id="mClose">닫기</button>
      </div>
      <div class="modalBody">
        <div class="kv"><div class="k">카테고리</div><div class="v" id="mCat"></div></div>
        <div class="kv"><div class="k">지역</div><div class="v" id="mArea"></div></div>
        <div class="kv"><div class="k">추천 메뉴</div><div class="v" id="mMenu"></div></div>
        <div class="kv"><div class="k">가격대</div><div class="v" id="mPrice"></div></div>
        <div class="kv"><div class="k">평점</div><div class="v" id="mRating"></div></div>
        <div class="kv"><div class="k">한줄평</div><div class="v" id="mDesc"></div></div>
        <div class="tips">
          다음 단계(나중): Supabase로 DB 붙이면 “등록/수정/리뷰/평점”까지 확장 가능!
        </div>
      </div>
    </div>
  </div>

<script>
  // ✅ 더미 데이터 (나중에 Supabase로 옮길 예정)
  let places = [
    { id: "1", name: "명동칼국수", cat: "한식", area: "서울", menu: "칼국수, 만두", price: "₩₩", rating: 4.6, desc: "국물이 진하고 면이 탱탱함. 만두 필수." },
    { id: "2", name: "홍대라멘집", cat: "일식", area: "서울", menu: "돈코츠 라멘", price: "₩₩", rating: 4.4, desc: "진한 돈코츠. 웨이팅 있지만 만족." },
    { id: "3", name: "부산돼지국밥", cat: "한식", area: "부산", menu: "돼지국밥", price: "₩", rating: 4.7, desc: "깊은 국물 맛. 김치랑 찰떡." },
    { id: "4", name: "성수피자바", cat: "양식", area: "서울", menu: "마르게리타", price: "₩₩₩", rating: 4.3, desc: "도우가 예술. 데이트 코스로 추천." },
    { id: "5", name: "제주흑돼지집", cat: "고기", area: "제주", menu: "흑돼지 오겹살", price: "₩₩₩", rating: 4.5, desc: "육즙 미쳤다. 예약하면 편함." },
    { id: "6", name: "대구막창골목", cat: "고기", area: "대구", menu: "막창, 곱창", price: "₩₩", rating: 4.2, desc: "불향 가득. 맥주랑 끝." },
  ];

  const $ = (sel) => document.querySelector(sel);

  const grid = $("#grid");
  const q = $("#q");
  const cat = $("#cat");
  const area = $("#area");
  const count = $("#count");
  const resetBtn = $("#reset");
  const addDemo = $("#addDemo");

  const modalBack = $("#modalBack");
  const mClose = $("#mClose");
  const mTitle = $("#mTitle");
  const mCat = $("#mCat");
  const mArea = $("#mArea");
  const mMenu = $("#mMenu");
  const mPrice = $("#mPrice");
  const mRating = $("#mRating");
  const mDesc = $("#mDesc");

  function uniq(arr){ return [...new Set(arr)].sort(); }
  function stars(r){
    const full = Math.round(r);
    return "★".repeat(full) + "☆".repeat(Math.max(0, 5-full));
  }

  function fillFilters(){
    const cats = uniq(places.map(p => p.cat));
    const areas = uniq(places.map(p => p.area));
    cat.innerHTML = `<option value="">카테고리(전체)</option>` + cats.map(c => `<option value="${c}">${c}</option>`).join("");
    area.innerHTML = `<option value="">지역(전체)</option>` + areas.map(a => `<option value="${a}">${a}</option>`).join("");
  }

  function getFiltered(){
    const qq = q.value.trim().toLowerCase();
    return places.filter(p => {
      const matchQ = !qq || (p.name + " " + p.menu + " " + p.area).toLowerCase().includes(qq);
      const matchCat = !cat.value || p.cat === cat.value;
      const matchArea = !area.value || p.area === area.value;
      return matchQ && matchCat && matchArea;
    });
  }

  function render(){
    const list = getFiltered();
    count.textContent = list.length;

    grid.innerHTML = list.map(p => `
      <div class="card" data-id="${p.id}">
        <div class="badge">${p.cat} · ${p.area}</div>
        <h3 class="title">${p.name}</h3>
        <p class="desc">${p.desc}</p>
        <div class="row">
          <div class="stars" title="평점 ${p.rating}">${stars(p.rating)}</div>
          <div>${p.price}</div>
        </div>
        <div class="actions">
          <button class="primary" data-open="${p.id}">상세 보기</button>
          <button class="ghost" data-copy="${p.id}">메뉴 복사</button>
        </div>
      </div>
    `).join("");

    // 이벤트 연결
    grid.querySelectorAll("[data-open]").forEach(btn => {
      btn.addEventListener("click", () => openModal(btn.dataset.open));
    });
    grid.querySelectorAll("[data-copy]").forEach(btn => {
      btn.addEventListener("click", async () => {
        const p = places.find(x => x.id === btn.dataset.copy);
        await navigator.clipboard.writeText(`${p.name} - 추천 메뉴: ${p.menu}`);
        btn.textContent = "복사됨!";
        setTimeout(() => btn.textContent = "메뉴 복사", 900);
      });
    });
  }

  function openModal(id){
    const p = places.find(x => x.id === id);
    if(!p) return;
    mTitle.textContent = p.name;
    mCat.textContent = p.cat;
    mArea.textContent = p.area;
    mMenu.textContent = p.menu;
    mPrice.textContent = p.price;
    mRating.textContent = `${p.rating} (${stars(p.rating)})`;
    mDesc.textContent = p.desc;

    modalBack.style.display = "flex";
  }

  function closeModal(){
    modalBack.style.display = "none";
  }

  q.addEventListener("input", render);
  cat.addEventListener("change", render);
  area.addEventListener("change", render);

  resetBtn.addEventListener("click", () => {
    q.value = "";
    cat.value = "";
    area.value = "";
    render();
  });

  addDemo.addEventListener("click", () => {
    const id = String(Date.now());
    places.unshift({
      id,
      name: "새로운 맛집(데모)",
      cat: ["한식","일식","중식","양식","고기","카페"][Math.floor(Math.random()*6)],
      area: ["서울","부산","대구","제주","인천"][Math.floor(Math.random()*5)],
      menu: "추천 메뉴 2~3개",
      price: ["₩","₩₩","₩₩₩"][Math.floor(Math.random()*3)],
      rating: Number((4 + Math.random()*1).toFixed(1)),
      desc: "데모로 추가된 맛집입니다. 나중엔 DB에 저장되게 만들 거예요."
    });
    fillFilters();
    render();
  });

  // 모달 닫기
  mClose.addEventListener("click", closeModal);
  modalBack.addEventListener("click", (e) => { if(e.target === modalBack) closeModal(); });
  document.addEventListener("keydown", (e) => { if(e.key === "Escape") closeModal(); });

  // 초기 렌더
  fillFilters();
  render();
</script>
</body>
</html>
